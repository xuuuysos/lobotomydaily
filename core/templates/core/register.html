{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — Lobotomy News</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f7f9fc;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #1a2b88;
        }
        .register-container {
            background: #fff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(26, 43, 136, 0.08);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logo {
            width: 60px;
            height: 60px;
            background: #1a2b88;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 700;
            font-size: 24px;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #111;
        }
        p {
            font-size: 14px;
            color: #666;
            margin-bottom: 30px;
        }
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #1a2b88;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #eaeaea;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus {
            border-color: #1a2b88;
        }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: #1a2b88;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            margin-top: 10px;
        }
        .btn-submit:hover {
            background-color: #121c59;
        }
        .btn-submit:active {
            transform: scale(0.98);
        }
        .footer-link {
            margin-top: 20px;
            font-size: 13px;
            color: #666;
        }
        .footer-link a {
            color: #1a2b88;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="logo">L</div>
        <h1>Lobotomy News</h1>
        <p>Создайте аккаунт для доступа к избранному</p>
        
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="example@mail.com" required>
            </div>
            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            <div class="form-group">
                <label for="password2">Повторите пароль</label>
                <input type="password" id="password2" name="password2" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-submit">Зарегистрироваться</button>
        </form>
        
        <div class="footer-link">
            Уже есть аккаунт? <a href="/">Вернуться на главную</a>
        </div>
    </div>
</body>
</html>
