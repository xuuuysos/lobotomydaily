{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль — Lobotomy News</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'core/style.css' %}">
</head>
<body style="overflow: auto;">
    <div class="auth-layout">
        <!-- Sidebar -->
        <div class="auth-sidebar">
            <div class="logo-section" style="cursor: pointer;" onclick="location.href='/'">
                <div class="logo-circle">
                    <img src="{% static 'core/logo.png' %}" alt="Logo">
                </div>
                <div class="logo-text">Lobotomy Daily</div>
            </div>
            
            <div class="auth-slogan">
                Оперативное получение новостей и ежедневной лоботомии
            </div>

            <div></div> <!-- Spacer -->
        </div>
        
        <!-- Main Area -->
        <main class="auth-main" style="padding: 60px 80px;">
            <div style="position: absolute; top: 40px; right: 40px; display: flex; gap: 20px; align-items: center;">
                <form action="{% url 'logout' %}" method="post" style="display: inline;">
                    {% csrf_token %}
                    <button type="submit" class="auth-top-link" style="background:none; border:none; cursor:pointer;">Выйти</button>
                </form>
            </div>
            
            <h1 class="profile-title">профиль</h1>
            
            <div class="profile-user-card">
                <div class="profile-avatar-box">
                    <img src="{% static 'core/avatar.png' %}" alt="Avatar">
                </div>
                <div class="profile-user-info">
                    <h2>{{ user.username }}</h2>
                    <p>{{ user.email|default:"no-email@lobotomy.news" }}</p>
                </div>
            </div>
            
            <div class="profile-actions-grid">
                <!-- Bookmarks Card -->
                <div class="profile-card">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/>
                    </svg>
                </div>
                <!-- Filters Card -->
                <div class="profile-card">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
                    </svg>
                </div>
                <!-- Likes Card -->
                <div class="profile-card">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M7 10v12"/>
                        <path d="M15 5.88 14 10h5.83a2 2 0 0 1 1.92 2.56l-2.33 8A2 2 0 0 1 17.5 22H4a2 2 0 0 1-2-2v-8a2 2 0 0 1 2-2h2.76a2 2 0 0 0 1.79-1.11L12 2h0a3.13 3.13 0 0 1 3 3.88Z"/>
                    </svg>
                </div>
            </div>
            
            <div class="profile-feed-header">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ddd" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/>
                </svg>
            </div>
            
            <div style="color: #bbb; font-size: 14px; font-style: italic;">
                Вы еще ничего не сохранили.
            </div>
        </main>
    </div>
</body>
</html>
