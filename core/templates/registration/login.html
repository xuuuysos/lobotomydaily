{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Lobotomy News</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'core/style.css' %}">
</head>
<body>
    <div class="auth-layout">
        <!-- Sidebar -->
        <div class="auth-sidebar">
            <div class="logo-section">
                <div class="logo-circle">
                    <img src="{% static 'core/logo.png' %}" alt="Logo">
                </div>
                <div class="logo-text">Lobotomy Daily</div>
            </div>
            
            <div class="auth-slogan">
                Оперативное получение новостей и ежедневной лоботомии
            </div>

        </div>
        
        <!-- Main Area -->
        <div class="auth-main">
            <a href="{% url 'register' %}" class="auth-top-link">Нет аккаунта?</a>
            
            <div class="auth-container">
                <h1 class="auth-title">ВХОД</h1>
                
                <form method="post">
                    {% csrf_token %}
                    
                    {% if form.errors %}
                    <div style="color: #eb5757; background: rgba(235, 87, 87, 0.1); padding: 12px; border-radius: 4px; margin-bottom: 20px; font-size: 13px;">
                        Введен неправильный логин или пароль. Попробуйте еще раз.
                    </div>
                    {% endif %}

                    <div class="auth-form-group">
                        <label for="id_username">Логин</label>
                        <input type="text" id="id_username" name="username" class="auth-input" required>
                    </div>
                    
                    <div class="auth-form-group">
                        <label for="id_password">Пароль</label>
                        <input type="password" id="id_password" name="password" class="auth-input" required>
                    </div>
                    
                    <div style="margin-top: 30px;">
                        <button type="submit" class="auth-submit-btn">Войти</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
